<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration - SCSA Financial Management</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box" style="max-width: 600px;">
            <div class="login-header">
                <h1>Student Registration</h1>
                <p>Saint Catherine of Siena Academy of Samal, Inc.</p>
            </div>
            
            <form id="registerForm" class="login-form">
                <div class="form-group">
                    <label for="lrn">LRN (Learner Reference Number) *</label>
                    <input type="text" id="lrn" name="lrn" placeholder="Enter your LRN" required>
                    <small style="color: #666; font-size: 0.85rem;">This will be used as your login username</small>
                </div>
                
                <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label for="firstName">First Name *</label>
                        <input type="text" id="firstName" name="firstName" placeholder="First name" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="middleName">Middle Name</label>
                        <input type="text" id="middleName" name="middleName" placeholder="Middle name">
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="lastName">Last Name *</label>
                    <input type="text" id="lastName" name="lastName" placeholder="Last name" required>
                </div>
                
                <div class="form-group">
                    <label for="contactNumber">Contact Number *</label>
                    <input type="tel" id="contactNumber" name="contactNumber" placeholder="09XXXXXXXXX" pattern="[0-9]{11}" required>
                    <small style="color: #666; font-size: 0.85rem;">Must be 11 digits starting with 09</small>
                </div>
                
                <div class="form-group">
                    <label for="password">Password *</label>
                    <input type="password" id="password" name="password" placeholder="Enter password" minlength="6" required>
                    <small style="color: #666; font-size: 0.85rem;">Minimum 6 characters</small>
                </div>
                
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password *</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm password" required>
                </div>
                
                <div id="registerError" class="error-message"></div>
                <div id="registerSuccess" class="success-message"></div>
                
                <button type="submit" class="btn-login">Register</button>
                
                <div style="text-align: center; margin-top: 20px;">
                    <p>Already have an account? <a href="index.html" style="color: #2563eb; text-decoration: none; font-weight: 500;">Login here</a></p>
                </div>
            </form>
        </div>
    </div>
    
    <script src="register.js"></script>
</body>
</html>
